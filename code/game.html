<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drag Race 3D – Game</title>
<script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
<script type="importmap">
	{
		"imports": {
			"three": "https://threejs.org/build/three.module.js",
			"three/addons/": "https://threejs.org/examples/jsm/"
		}
	}
</script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="dashboard">
	<div class="meter meter--rpm meter--big-label"></div>
	<div class="meter meter--gear"><div>N</div></div>
</div>

<div id="raceCountdown" class="race-overlay race-overlay--countdown hidden">5</div>
<div id="raceFinish" class="race-overlay race-overlay--finish hidden">
	<div class="race-overlay__title">Finish</div>
	<div id="raceFinishTime" class="race-overlay__time">0.00s</div>
</div>

<div class="race-controls">
	<button id="restartRaceBtn" class="race-btn" type="button">Restart</button>
	<button id="menuRaceBtn" class="race-btn race-btn--secondary" type="button">Menu</button>
</div>


<script src="cars.js"></script>
<script type="module">
	import * as THREE from 'three';
	import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
	window.THREE = THREE;
	window.GLTFLoader = GLTFLoader;

	const gameScript = document.createElement('script');
	gameScript.src = 'game.js';
	document.body.appendChild(gameScript);
</script>
</body>
</html>
